<!DOCTYPE html>
<html>
<head>
  <base href="/admin/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- Prevent Caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="description" content="BTpays CRM">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bt_admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BTpays CRM</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Force clear service workers and caches on page load if a new version is detected
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // Clear functional caches
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (let name of names) caches.delete(name);
      });
    }
  </script>
  <!-- Appending a timestamp or version here helps bust the cache for the bootstrapper -->
  <script src="flutter_bootstrap.js?v=1.0.1" async></script>
</body>
</html>
