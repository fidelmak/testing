<!DOCTYPE html>
<html>
<head>
  <!-- Changing this to / allows it to work on Vercel root.
       If you deploy to a subfolder on cPanel, you may need to change it back to /admin/
       or use a relative path like ./ -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>BTpays CRM</title>

  <script>
    // 1. Unregister service workers to avoid "old version" issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // 2. Clear caches on version mismatch
    var currentVersion = '1.0.12';
    if (localStorage.getItem('app_version') !== currentVersion) {
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
      }
      localStorage.setItem('app_version', currentVersion);
      // We don't force reload here to avoid a white screen loop on some hosts
    }
  </script>

  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- This script initializes the Flutter app -->
  <script src="flutter_bootstrap.js?v=1.0.12" async></script>
</body>
</html>
